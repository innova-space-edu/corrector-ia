name: corrector_ia_mobile
description: App móvil para subida guiada de exámenes — Corrector IA Docente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  shared_preferences: ^2.3.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
