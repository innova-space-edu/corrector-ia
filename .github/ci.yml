name: CI — Corrector IA

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── TEST PANEL WEB ──────────────────────────────────────────────
  test-web:
    name: Panel Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-for-build"
          AI_PROVIDER_API_KEY: "placeholder-for-build"
          OCR_SERVICE_URL: "http://localhost:8001"

  # ─── TEST OCR SERVICE ────────────────────────────────────────────
  test-ocr:
    name: OCR Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ocr-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/ocr-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (fast)
        run: python -m py_compile main.py orchestrator.py orchestrate_endpoint.py

      - name: Check services syntax
        run: |
          python -m py_compile services/image_preprocess.py
          python -m py_compile services/quality_check.py
          python -m py_compile services/extract_ocr.py
          python -m py_compile services/parse_math_steps.py
          python -m py_compile services/merge_confidence.py

  # ─── DEPLOY STATUS ───────────────────────────────────────────────
  notify:
    name: Deploy Status
    runs-on: ubuntu-latest
    needs: [test-web, test-ocr]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: All checks passed
        run: echo "✅ CI passed — Vercel y Render harán deploy automático desde main"
